<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#050508">
    <meta name="robots" content="noindex">
    <title>404 — Gregory Yuzik</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=20260413-2">
    <link rel="icon" href="/favicon.ico?v=20260413-2">
    <style>
        html{background:#050508}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
            -webkit-font-smoothing:antialiased;
            background:#050508;
            color:#fff;
            min-height:100svh;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:max(1.5rem,env(safe-area-inset-top)) max(1.5rem,env(safe-area-inset-right)) max(1.5rem,env(safe-area-inset-bottom)) max(1.5rem,env(safe-area-inset-left));
        }
        main{max-width:420px}
        h1{
            font-size:clamp(3rem,10vw,5rem);
            font-weight:800;letter-spacing:-.04em;line-height:1;
            margin-bottom:1rem;
            text-shadow:0 2px 12px rgba(0,0,0,.5);
        }
        p{
            color:rgba(255,255,255,.62);
            font-size:1rem;line-height:1.6;
            margin-bottom:2rem;
        }
        a{
            display:inline-flex;align-items:center;
            padding:12px 22px;min-height:44px;border-radius:100px;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.12);
            text-decoration:none;color:rgba(255,255,255,.62);
            font-size:.9rem;font-weight:500;
            transition:background .2s,color .2s,border-color .2s;
        }
        a:hover{
            background:rgba(255,255,255,.14);
            color:#fff;
            border-color:rgba(255,255,255,.2);
        }
        a:focus-visible{outline:2px solid rgba(255,255,255,.5);outline-offset:2px}
    </style>
</head>
<body>
    <main>
        <h1>404</h1>
        <p>This page doesn't exist.</p>
        <a href="/">Go home</a>
    </main>
</body>
</html>
