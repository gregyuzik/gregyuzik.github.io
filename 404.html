<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https://*.analytics.google.com; img-src 'self' data: https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; font-src 'self'; object-src 'none'; base-uri 'self';">

    <meta name="theme-color" content="#05060b">
    <meta name="robots" content="noindex">
    <title>404 — Gregory Yuzik</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png?v=20260417-2">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=20260417-2">

    <link rel="preconnect" href="https://www.google-analytics.com" crossorigin>

    <!-- Google tag (gtag.js) -->
    <script src="/assets/js/gtag.js?v=20260413-1"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6F30H7DLZ"></script>
    <style>
        @font-face{
            font-family:'Inter';
            font-style:normal;
            font-weight:100 900;
            font-display:swap;
            src:url('/assets/fonts/inter-latin.woff2') format('woff2');
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{background:#05060b;color-scheme:dark}
        :root{
            --bg:#05060b;
            --ink:#f6f6f8;
            --ink-2:rgba(246,246,248,.66);
            --glass:rgba(255,255,255,.055);
            --glass-hi:rgba(255,255,255,.10);
            --edge:rgba(255,255,255,.09);
            --edge-hi:rgba(255,255,255,.18);
            --sans:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
            --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
            --ease:cubic-bezier(.16,1,.3,1);
        }
        body{
            font-family:var(--sans);
            -webkit-font-smoothing:antialiased;
            background:var(--bg);
            color:var(--ink);
            min-height:100svh;
            display:flex;align-items:center;justify-content:center;text-align:center;
            padding:max(1.5rem,env(safe-area-inset-top)) max(1.5rem,env(safe-area-inset-right)) max(1.5rem,env(safe-area-inset-bottom)) max(1.5rem,env(safe-area-inset-left));
            overflow:hidden;position:relative;
        }
        .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
        .wash{
            position:absolute;inset:-10%;
            background:
              radial-gradient(58vmax 44vmax at 22% 12%,rgba(220,196,164,.10),transparent 65%),
              radial-gradient(68vmax 52vmax at 88% 96%,rgba(140,150,172,.08),transparent 70%);
        }
        .vignette{
            position:absolute;inset:0;pointer-events:none;
            background:radial-gradient(ellipse at 50% 38%,transparent 48%,rgba(0,0,0,.55) 100%);
        }
        main{position:relative;z-index:1;max-width:460px}
        .code{
            font-family:var(--sans);font-weight:600;
            font-size:clamp(5rem,16vw,8rem);letter-spacing:-.05em;line-height:.9;
            background:linear-gradient(180deg,#fff 0%,#d6d6dc 60%,#b7b7bf 100%);
            -webkit-background-clip:text;background-clip:text;
            -webkit-text-fill-color:transparent;color:transparent;
            margin-bottom:.75rem;
        }
        .tag{
            font-family:var(--mono);font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;
            color:var(--ink-2);margin-bottom:1.75rem;
        }
        p{color:var(--ink-2);font-size:1rem;line-height:1.6;margin-bottom:2rem}
        a.home{
            display:inline-flex;align-items:center;gap:.5rem;
            padding:11px 20px;min-height:44px;border-radius:100px;
            background:var(--glass);
            border:1px solid var(--edge);
            backdrop-filter:blur(18px) saturate(1.6);
            -webkit-backdrop-filter:blur(18px) saturate(1.6);
            text-decoration:none;color:var(--ink-2);
            font-size:.82rem;font-weight:500;letter-spacing:.02em;
            transition:background .25s,color .25s,border-color .25s,transform .35s var(--ease);
        }
        a.home:hover{background:var(--glass-hi);color:var(--ink);border-color:var(--edge-hi);transform:translateY(-1px)}
        a.home:focus-visible{outline:none;box-shadow:0 0 0 2px rgba(242,237,227,.6)}
        @media (prefers-reduced-motion:reduce){
            *,*::before,*::after{transition-duration:.01ms !important}
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true">
        <div class="wash"></div>
        <div class="vignette"></div>
    </div>
    <main>
        <div class="code">404</div>
        <div class="tag">Page Not Found</div>
        <p>The page you're looking for has drifted off the grid.</p>
        <a class="home" href="/">&larr; Return home</a>
    </main>
</body>
</html>
