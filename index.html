<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gregory Yuzik</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6F30H7DLZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E6F30H7DLZ');
    </script>
    <meta name="description" content="iOS developer. Creator of Klosyt and vultyr.">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --glass-bg:rgba(255,255,255,.06);
            --glass-border:rgba(255,255,255,.10);
            --glass-hover:rgba(255,255,255,.12);
            --text-1:#fff;
            --text-2:rgba(255,255,255,.55);
            --text-3:rgba(255,255,255,.3);
            --radius:20px;
            --ease:cubic-bezier(.16,1,.3,1);
        }
        html{scroll-behavior:smooth}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,sans-serif;
            -webkit-font-smoothing:antialiased;
            background:#050508;
            color:var(--text-1);
            min-height:100vh;
            overflow-x:hidden;
        }

        /* Animated gradient mesh */
        .mesh-bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#050508}
        .mesh-orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.45;will-change:transform}
        .orb-1{width:550px;height:550px;background:radial-gradient(circle,#1a3d8f 0%,transparent 70%);top:-8%;left:-5%;animation:f1 18s ease-in-out infinite alternate}
        .orb-2{width:450px;height:450px;background:radial-gradient(circle,#6a2fc1 0%,transparent 70%);bottom:-8%;right:-5%;animation:f2 22s ease-in-out infinite alternate}
        .orb-3{width:350px;height:350px;background:radial-gradient(circle,#0a5e8a 0%,transparent 70%);top:45%;left:55%;animation:f3 20s ease-in-out infinite alternate}
        @keyframes f1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(80px,60px) scale(1.15)}}
        @keyframes f2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-70px,-50px) scale(1.1)}}
        @keyframes f3{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-40px,70px) scale(1.2)}}

        /* Layout */
        .wrap{max-width:720px;margin:0 auto;padding:0 1.5rem;position:relative;z-index:1}

        /* Hero */
        .hero{
            min-height:100vh;min-height:100dvh;
            display:flex;align-items:center;justify-content:center;
            text-align:center;padding:80px 1.5rem;
            position:relative;z-index:1;
        }
        .hero-inner{max-width:600px}
        .hero h1{
            font-size:clamp(2.5rem,6vw,3.5rem);
            font-weight:800;letter-spacing:-.04em;line-height:1.1;
            margin-bottom:2rem;
        }
        .hero-sub{
            font-size:clamp(1rem,2.2vw,1.15rem);
            color:var(--text-2);line-height:1.6;
            margin-bottom:2.5rem;
        }

        /* Apps */
        .apps{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:3rem}
        .app-card{
            display:flex;align-items:center;gap:1.25rem;
            padding:1.5rem;border-radius:var(--radius);
            background:var(--glass-bg);
            backdrop-filter:blur(40px) saturate(1.6);
            -webkit-backdrop-filter:blur(40px) saturate(1.6);
            border:1px solid var(--glass-border);
            text-decoration:none;color:var(--text-1);
            transition:background .3s var(--ease),border-color .3s var(--ease),transform .3s var(--ease);
        }
        .app-card:hover{
            background:var(--glass-hover);
            border-color:rgba(255,255,255,.18);
            transform:translateY(-3px);
        }
        .app-icon{
            width:72px;height:72px;border-radius:16px;flex-shrink:0;
            box-shadow:0 8px 32px rgba(0,0,0,.4);
        }
        .app-info{flex:1;min-width:0}
        .app-name{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;margin-bottom:.25rem}
        .app-name.audiowide{font-family:'Audiowide',sans-serif;font-weight:400;letter-spacing:-.02em}
        .app-desc{font-size:.88rem;color:var(--text-2);line-height:1.5}
        .app-arrow{
            color:var(--text-3);font-size:1.2rem;flex-shrink:0;
            transition:color .2s,transform .2s;
        }
        .app-card:hover .app-arrow{color:var(--text-2);transform:translateX(3px)}

        /* Links */
        .links{
            display:flex;justify-content:center;gap:1rem;
            flex-wrap:wrap;
        }
        .link-btn{
            display:inline-flex;align-items:center;gap:8px;
            padding:10px 22px;border-radius:100px;
            background:var(--glass-bg);
            backdrop-filter:blur(40px) saturate(1.6);
            -webkit-backdrop-filter:blur(40px) saturate(1.6);
            border:1px solid var(--glass-border);
            text-decoration:none;color:var(--text-2);
            font-size:.9rem;font-weight:500;
            transition:background .2s,color .2s,border-color .2s;
        }
        .link-btn:hover{background:var(--glass-hover);color:var(--text-1);border-color:rgba(255,255,255,.18)}
        .link-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}

        /* Fade in */
        .fade-up{opacity:0;transform:translateY(24px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
        .fade-up.in{opacity:1;transform:translateY(0)}

        /* Responsive */
        @media(max-width:480px){
            .hero h1{font-size:2.2rem}
            .app-card{flex-direction:column;text-align:center;gap:1rem;padding:1.25rem}
            .app-arrow{display:none}
            .links{gap:.75rem}
            .link-btn{padding:10px 18px;font-size:.85rem}
            .mesh-orb{filter:blur(80px);opacity:.3}
        }
    </style>
</head>
<body>

<div class="mesh-bg">
    <div class="mesh-orb orb-1"></div>
    <div class="mesh-orb orb-2"></div>
    <div class="mesh-orb orb-3"></div>
</div>

<section class="hero">
    <div class="hero-inner fade-up">
        <h1>Gregory Yuzik</h1>


        <div class="apps">
            <a href="https://klosyt.com" class="app-card" target="_blank" rel="noopener">
                <img src="assets/KlosytIcon.png" alt="Klosyt" class="app-icon">
                <div class="app-info">
                    <div class="app-name">Klosyt</div>
                    <div class="app-desc">Your AI-powered digital closet.</div>
                </div>
                <span class="app-arrow">&rsaquo;</span>
            </a>
            <a href="https://vultyr.app" class="app-card" target="_blank" rel="noopener">
                <img src="assets/VultyrIcon.png" alt="Vultyr" class="app-icon">
                <div class="app-info">
                    <div class="app-name audiowide">vultyr</div>
                    <div class="app-desc">Circling your stack. 200+ services monitored.</div>
                </div>
                <span class="app-arrow">&rsaquo;</span>
            </a>
        </div>

        <div class="links">
            <a href="https://github.com/gregyuzik" class="link-btn" target="_blank" rel="noopener">
                <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </a>
            <a href="https://linkedin.com/in/gregyuzik" class="link-btn" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
            </a>
            <a href="assets/resume.pdf" class="link-btn" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
                Resume
            </a>
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded',function(){
    var io=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
            if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}
        });
    },{threshold:.1});
    document.querySelectorAll('.fade-up').forEach(function(el){io.observe(el);});
});
</script>
</body>
</html>
