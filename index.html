    <style>
        @font-face{
            font-family:'Inter';
            font-style:normal;
            font-weight:100 900;
            font-display:swap;
            src:url('/assets/fonts/inter-latin.woff2') format('woff2');
        }
        @font-face{
            font-family:'Audiowide';
            font-style:normal;
            font-weight:400;
            font-display:swap;
            src:url('/assets/fonts/audiowide-vultyr.woff2') format('woff2');
            unicode-range:U+006C,U+0072,U+0074,U+0075,U+0076,U+0079;
        }

        /* Solid bg on <html> fills Safari chrome, rubber-band overscroll, and safe-area insets */
        html{background:#050508}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{
            --glass-bg:rgba(255,255,255,.08);
            --glass-border:rgba(255,255,255,.12);
            --glass-hover:rgba(255,255,255,.14);
            --text-1:#fff;
            --text-2:rgba(255,255,255,.62);
            --text-3:rgba(255,255,255,.3);
            --radius:20px;
            --ease:cubic-bezier(.16,1,.3,1);
        }
        body{
            font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
            -webkit-font-smoothing:antialiased;
            background:#050508;
            color:var(--text-1);
            min-height:100svh;
            overflow-x:hidden;
        }


        /* Hero */
        .hero{
            min-height:100svh;
            display:flex;align-items:center;justify-content:center;
            text-align:center;
            padding:max(80px,env(safe-area-inset-top)) max(1.5rem,env(safe-area-inset-right)) max(80px,env(safe-area-inset-bottom)) max(1.5rem,env(safe-area-inset-left));
            position:relative;z-index:1;
        }
        .hero-inner{max-width:600px;width:100%}
        .hero h1{
            font-size:clamp(2.5rem,6vw,3.5rem);
            font-weight:800;letter-spacing:-.04em;line-height:1.1;
            margin-bottom:2rem;
            text-shadow:0 2px 12px rgba(0,0,0,.5);
        }
        .hero-sub{
            font-size:clamp(1rem,2.2vw,1.15rem);
            color:var(--text-2);line-height:1.6;
            margin-bottom:2.5rem;letter-spacing:.04em;text-transform:uppercase;font-weight:500;
            text-shadow:0 1px 4px rgba(0,0,0,.5);
        }

        /* Apps */
        .apps{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:3rem}
        .app-card{
            display:flex;align-items:center;gap:1.25rem;
            padding:1.5rem;border-radius:var(--radius);
            background:var(--glass-bg);
            border:1px solid var(--glass-border);
            text-decoration:none;color:var(--text-1);
            transition:background .3s var(--ease),border-color .3s var(--ease),transform .3s var(--ease);
        }
        .app-card:hover{
            background:var(--glass-hover);
            border-color:rgba(255,255,255,.2);
            transform:translateY(-3px);
        }
        .app-icon{
            width:72px;height:72px;border-radius:16px;flex-shrink:0;
            box-shadow:0 8px 32px rgba(0,0,0,.4);
        }
        .app-info{flex:1;min-width:0}
        .app-name{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;margin-bottom:.25rem;text-shadow:0 1px 4px rgba(0,0,0,.5)}
        .app-name.audiowide{font-family:'Audiowide',sans-serif;font-weight:400;letter-spacing:-.02em}
        .app-desc{font-size:.88rem;color:var(--text-2);line-height:1.5;text-shadow:0 1px 4px rgba(0,0,0,.5)}
        .app-arrow{
            color:var(--text-3);font-size:1.2rem;flex-shrink:0;
            transition:color .2s,transform .2s;
        }
        .app-card:hover .app-arrow{color:var(--text-2);transform:translateX(3px)}

        /* Links */
        .links{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap}
        .link-btn{
            display:inline-flex;align-items:center;gap:8px;
            padding:10px 22px;border-radius:100px;
            background:var(--glass-bg);
            border:1px solid var(--glass-border);
            text-decoration:none;color:var(--text-2);
            font-size:.9rem;font-weight:500;
            transition:background .2s,color .2s,border-color .2s;
        }
        .link-btn:hover{background:var(--glass-hover);color:var(--text-1);border-color:rgba(255,255,255,.2)}
        .link-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
        .app-card:focus-visible,.link-btn:focus-visible{outline:2px solid rgba(255,255,255,.5);outline-offset:2px}

        /* Fade in — visible by default; JS hides then reveals */
        .fade-up{transition:opacity .7s var(--ease),transform .7s var(--ease)}
        .js .fade-up{opacity:0;transform:translateY(24px)}
        .js .fade-up.in{opacity:1;transform:none}

        /* Smooth scroll only for users who haven't requested reduced motion */
        @media (prefers-reduced-motion: no-preference){
            html{scroll-behavior:smooth}
        }

        /* Responsive */
        @media (max-width:480px){
            .hero h1{font-size:2.2rem}
            .app-card{flex-direction:column;text-align:center;gap:1rem;padding:1.25rem}
            .app-arrow{display:none}
            .links{gap:.75rem}
            .link-btn{padding:10px 18px;font-size:.85rem}
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce){
            *,*::before,*::after{
                animation-duration:.01ms !important;
                animation-iteration-count:1 !important;
                transition-duration:.01ms !important;
                scroll-behavior:auto !important;
            }
            .js .fade-up{opacity:1;transform:none;transition:none}
        }
    </style>

<body>

<main class="hero">

            <a href="https://linkedin.com/in/gregyuzik" class="link-btn" target="_blank" rel="noopener" aria-label="LinkedIn (opens in new tab)">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
            </a>
            <a href="/assets/resume.pdf" class="link-btn" target="_blank" rel="noopener" aria-label="Resume (opens in new tab)">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
                Resume
            </a>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded',function(){
    var io=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
            if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}
        });
    },{threshold:.1});
    document.querySelectorAll('.fade-up').forEach(function(el){io.observe(el);});
});
</script>
